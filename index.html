<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestige Forum | 專業論壇中心</title>
    <!-- Tailwind CSS for Professional Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Config for Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-black': '#1a1a1a',
                        'secondary-gray': '#4a4a4a',
                        'light-gray': '#f5f5f5',
                        'border-gray': '#e5e5e5'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-white text-primary-black font-sans min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="border-b border-border-gray bg-white sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="window.location.hash=''">
                    <span class="text-2xl font-bold tracking-tight">PRESTIGE<span class="text-secondary-gray font-light">FORUM</span></span>
                </div>
                <div class="hidden sm:ml-6 sm:flex sm:space-x-8" id="nav-links">
                    <!-- Nav items injected by JS -->
                </div>
                <div class="flex items-center space-x-4" id="auth-buttons">
                    <!-- Auth buttons injected by JS -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app" class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <!-- Content injected by Router -->
        <div class="animate-pulse space-y-4">
            <div class="h-4 bg-gray-200 rounded w-3/4"></div>
            <div class="h-4 bg-gray-200 rounded"></div>
            <div class="h-4 bg-gray-200 rounded w-5/6"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-primary-black text-white py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <p class="text-sm text-gray-400">&copy; 2026 Prestige Forum. All rights reserved.</p>
            <div class="text-sm text-gray-500 space-x-4">
                <a href="#" class="hover:text-white transition">隱私權政策</a>
                <a href="#" class="hover:text-white transition">使用條款</a>
            </div>
        </div>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

    <!-- Application Logic -->
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            console.error(message, error);
            const errDiv = document.createElement('div');
            errDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:10px;z-index:9999;';
            errDiv.textContent = '系統錯誤: ' + message + ' (' + source + ':' + lineno + ')';
            document.body.appendChild(errDiv);
        };
    </script>
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
